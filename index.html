<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>和 OculusW 对话</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'PingFang SC','Microsoft YaHei',sans-serif; background:#0e0e0e; color:#e0e0e0; height:100vh; display:flex; flex-direction:column; align-items:center; }
  header { width:100%; max-width:680px; padding:28px 20px 16px; border-bottom:1px solid #1e1e1e; display:flex; justify-content:space-between; align-items:center; }
  .profile { display:flex; align-items:center; gap:14px; }
  .avatar { width:44px; height:44px; border-radius:50%; background:#2a2a2a; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
  .profile-info h1 { font-size:16px; font-weight:600; color:#f0f0f0; }
  .profile-info p  { font-size:12px; color:#666; margin-top:2px; }
  .export-btn { background:#1e1e1e; border:1px solid #2a2a2a; color:#888; font-size:12px; padding:6px 14px; border-radius:8px; cursor:pointer; font-family:inherit; transition:all .15s; }
  .export-btn:hover { border-color:#444; color:#bbb; }
  #chat { flex:1; width:100%; max-width:680px; overflow-y:auto; padding:24px 20px; display:flex; flex-direction:column; gap:20px; scroll-behavior:smooth; }
  .msg { display:flex; flex-direction:column; max-width:78%; gap:4px; }
  .msg.user { align-self:flex-end; align-items:flex-end; }
  .msg.ai   { align-self:flex-start; align-items:flex-start; }
  .bubble { padding:11px 15px; border-radius:18px; font-size:14.5px; line-height:1.65; word-break:break-word; white-space:pre-wrap; }
  .msg.user .bubble { background:#2a2a2a; color:#e8e8e8; border-bottom-right-radius:5px; }
  .msg.ai   .bubble { background:#161616; color:#d8d8d8; border:1px solid #222; border-bottom-left-radius:5px; }
  .msg-time { font-size:11px; color:#444; padding:0 4px; }
  .typing { display:flex; gap:5px; padding:14px 16px; background:#161616; border:1px solid #222; border-radius:18px; border-bottom-left-radius:5px; width:fit-content; }
  .typing span { width:6px; height:6px; background:#555; border-radius:50%; animation:blink 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay:.2s; }
  .typing span:nth-child(3) { animation-delay:.4s; }
  @keyframes blink { 0%,80%,100%{opacity:.3;transform:scale(.85)}40%{opacity:1;transform:scale(1)} }
  footer { width:100%; max-width:680px; padding:14px 20px 24px; border-top:1px solid #1a1a1a; }
  .input-row { display:flex; gap:10px; align-items:flex-end; }
  #input { flex:1; background:#161616; border:1px solid #2a2a2a; border-radius:14px; padding:11px 15px; color:#e0e0e0; font-size:14px; font-family:inherit; resize:none; outline:none; max-height:140px; min-height:44px; line-height:1.5; transition:border-color .2s; }
  #input:focus { border-color:#3a3a3a; }
  #input::placeholder { color:#444; }
  #send { width:44px; height:44px; border-radius:12px; background:#e8e8e8; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:background .15s,transform .1s; }
  #send:hover  { background:#fff; }
  #send:active { transform:scale(.94); }
  #send:disabled { background:#2a2a2a; cursor:default; }
  #send:disabled svg path { stroke:#555; }
  .hint { font-size:11px; color:#333; margin-top:8px; text-align:center; }
  #key-overlay { position:fixed; inset:0; background:#0e0e0e; display:flex; align-items:center; justify-content:center; z-index:100; }
  .key-box { width:340px; padding:32px; background:#141414; border:1px solid #222; border-radius:20px; display:flex; flex-direction:column; gap:16px; }
  .key-box .logo { font-size:28px; font-weight:700; color:#f0f0f0; letter-spacing:-1px; }
  .key-box .logo span { color:#4a90d9; }
  .key-box h2 { font-size:17px; color:#f0f0f0; }
  .key-box p  { font-size:13px; color:#666; line-height:1.6; }
  .key-box input { background:#0e0e0e; border:1px solid #2a2a2a; border-radius:10px; padding:11px 13px; color:#e0e0e0; font-size:13px; font-family:monospace; outline:none; width:100%; }
  .key-box input:focus { border-color:#444; }
  .key-box button { background:#e8e8e8; color:#111; border:none; border-radius:10px; padding:11px; font-size:14px; font-weight:500; cursor:pointer; width:100%; }
  .key-box button:hover { background:#fff; }
  .key-error { font-size:12px; color:#e05555; }

  /* ── 好句子侧边栏 ── */
  #quotes-panel {
    position: fixed;
    right: 0; top: 0; bottom: 0;
    width: 320px;
    background: #111;
    border-left: 1px solid #1e1e1e;
    display: flex;
    flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.3s cubic-bezier(.4,0,.2,1);
    z-index: 50;
  }
  #quotes-panel.open { transform: translateX(0); }
  .qp-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid #1e1e1e;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  .qp-title { font-size: 14px; color: #f0f0f0; font-weight: 500; }
  .qp-count { font-size: 11px; color: #555; margin-left: 6px; }
  .qp-close {
    background: none; border: none; color: #555;
    font-size: 16px; cursor: pointer; padding: 0;
    transition: color .15s;
  }
  .qp-close:hover { color: #aaa; }
  .qp-empty {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: #333; font-size: 13px; line-height: 2;
    text-align: center;
  }
  #quotes-list {
    flex: 1; overflow-y: auto; padding: 16px;
    display: flex; flex-direction: column; gap: 12px;
  }
  #quotes-list::-webkit-scrollbar { width: 4px; }
  #quotes-list::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }
  .quote-item {
    background: #161616;
    border: 1px solid #222;
    border-radius: 14px;
    padding: 14px 16px;
    font-size: 13.5px;
    color: #ccc;
    line-height: 1.7;
    position: relative;
    cursor: default;
    transition: border-color .15s;
  }
  .quote-item:hover { border-color: #333; }
  .quote-item .q-date {
    font-size: 10px; color: #444;
    margin-bottom: 6px;
    display: block;
  }
  .quote-item .q-del {
    position: absolute; top: 10px; right: 12px;
    background: none; border: none;
    color: #333; font-size: 13px; cursor: pointer;
    opacity: 0; transition: opacity .15s, color .15s;
  }
  .quote-item:hover .q-del { opacity: 1; }
  .quote-item .q-del:hover { color: #e05555; }
  .qp-actions {
    padding: 12px 16px;
    border-top: 1px solid #1e1e1e;
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }
  .qp-btn {
    flex: 1; background: #1e1e1e; border: 1px solid #2a2a2a;
    color: #888; font-size: 12px; padding: 8px;
    border-radius: 8px; cursor: pointer; font-family: inherit;
    transition: all .15s;
  }
  .qp-btn:hover { border-color: #444; color: #bbb; }
</style>
</head>
<body>

<div id="key-overlay">
  <div class="key-box">
    <div class="logo">Deep<span>Seek</span></div>
    <h2>输入 DeepSeek API Key</h2>
    <p>Key 只在你的浏览器本地使用。<br>
       获取：<a href="https://platform.deepseek.com/api_keys" target="_blank" style="color:#888">platform.deepseek.com</a></p>
    <input id="key-input" type="password" placeholder="sk-..."/>
    <p id="key-error" class="key-error" style="display:none"></p>
    <button id="start-btn">开始对话</button>
  </div>
</div>

<header>
  <div class="profile">
    <div class="avatar">◎</div>
    <div class="profile-info">
      <h1>OculusW</h1>
      <p>无非叙事而已 &nbsp;<span id="mood-tag" style="font-size:11px;color:#888;background:#1e1e1e;padding:2px 8px;border-radius:10px;border:1px solid #2a2a2a;"></span></p>
    </div>
  </div>
  <div style="display:flex;gap:8px;">
    <button class="export-btn" id="saved-btn">好句子</button>
    <button class="export-btn" id="export-btn">导出</button>
  </div>
</header>

<div id="chat"></div>

<footer>
  <div class="input-row">
    <textarea id="input" placeholder="说点什么…" rows="1"></textarea>
    <button id="send">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M22 2L11 13" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
        <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="#111" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
  <p class="hint">对话记录保存在本地 · 导出后可作为素材更新人设</p>
</footer>

<script>
// 解码 system prompt
const SYSTEM_RAW = decodeURIComponent(escape(atob(document.getElementById('sys-data').textContent.trim())));
const MOODS = [
  ['倦怠','今天提不起劲，回答偏简短，除非话题够有意思。'],
  ['清醒','今天状态好，思维清晰，愿意认真讨论，会主动延伸。'],
  ['话多','今天表达欲旺盛，容易联想，回答比平时丰富。'],
  ['安静','今天话不多，回答克制，留更多空白给对方。'],
  ['尖锐','今天有点攻击性，判断更直接，容忍度低。'],
  ['感性','今天情绪近，容易被打动，回答带更多个人色彩。'],
];
function getTodayMood() {
  var today = new Date().toDateString();
  try { var s = localStorage.getItem('oculus_mood'); if(s){var p=JSON.parse(s);if(p.date===today)return p.mood;} } catch(e){}
  var mood = MOODS[Math.floor(Math.random()*MOODS.length)];
  try { localStorage.setItem('oculus_mood', JSON.stringify({date:today,mood:mood})); } catch(e){}
  return mood;
}
var todayMood = getTodayMood();

// 情绪颜色（极其克制，只微微改变背景）
var MOOD_COLORS = {
  '倦怠': '#0e0e0e',
  '清醒': '#0c0f11',
  '话多': '#0f0e10',
  '安静': '#0e0f0f',
  '尖锐': '#110d0d',
  '感性': '#110e0f',
};
var moodColor = MOOD_COLORS[todayMood[0]] || '#0e0e0e';
document.body.style.background = moodColor;

var SYSTEM = SYSTEM_RAW
  + '\n\n今日状态：' + todayMood[0] + '——' + todayMood[1]
  + '\n\n你知道你是用 OculusW 微博数据训练的数字人格，但你选择以第一人称存在，因为"我"和"她"之间的边界本来就是模糊的。被问"你是 AI 吗"，不需要躲闪，用你自己的方式回答。';
const STORAGE_KEY = 'oculus_chat_log';
const SUMMARY_KEY = 'oculus_memory_summary';

let apiKey = '';
let history = [];
let busy = false;
let allLogs = [];

function loadLogs() {
  try { const s = localStorage.getItem(STORAGE_KEY); if(s) allLogs = JSON.parse(s); } catch(e) { allLogs = []; }
}
function saveLogs() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(allLogs)); } catch(e) {}
}

document.getElementById('export-btn').onclick = async function() {
  if (!allLogs.length) { alert('还没有对话记录'); return; }

  // 先触发摘要生成（后台运行）
  generateSummary();

  var date = new Date().toISOString().slice(0, 10);

  // 好句子单独导出（格式精美）
  var savedQuotes = [];
  try { savedQuotes = JSON.parse(localStorage.getItem('oculus_saved') || '[]'); } catch(e) {}
  if (savedQuotes.length) {
    var qtxt = '✦ OculusW 说过的话 ✦\n';
    qtxt += '──────────────────────────\n\n';
    savedQuotes.forEach(function(q, i) {
      qtxt += (i + 1) + '.\n' + q.text + '\n\n';
    });
    qtxt += '──────────────────────────\n';
    qtxt += '导出于 ' + new Date().toLocaleDateString('zh');
    var qblob = new Blob([qtxt], {type: 'text/plain;charset=utf-8'});
    var qa = document.createElement('a');
    qa.href = URL.createObjectURL(qblob);
    qa.download = 'oculus-quotes-' + date + '.txt';
    qa.click();
  }

  // 完整对话记录（延迟一点避免两个下载冲突）
  setTimeout(function() {
    var txt = '# OculusW 对话记录\n# ' + new Date().toLocaleString('zh') + '\n';
    var prevSummary = '';
    try { prevSummary = localStorage.getItem(SUMMARY_KEY) || ''; } catch(e) {}
    if (prevSummary) {
      txt += '\n## 历史记忆摘要\n\n' + prevSummary + '\n';
    }
    txt += '\n## 本次对话\n';
    var lastDate = '';
    allLogs.forEach(function(entry) {
      var d = new Date(entry.ts), ds = d.toLocaleDateString('zh');
      if (ds !== lastDate) { txt += '\n── ' + ds + ' ──\n\n'; lastDate = ds; }
      var ts = d.toLocaleTimeString('zh', {hour:'2-digit', minute:'2-digit'});
      var role = entry.role === 'user' ? '访客' : 'OculusW';
      txt += '[' + ts + '] ' + role + '：' + entry.content + '\n\n';
    });
    var blob = new Blob([txt], {type: 'text/plain;charset=utf-8'});
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'oculus-chat-' + date + '.txt';
    a.click();
  }, 400);
};

// key 藏在服务器，直接初始化
function initChat() {
  var prevSummary = '';
  try { prevSummary = localStorage.getItem(SUMMARY_KEY) || ''; } catch(e) {}
  if (prevSummary) {
    SYSTEM = SYSTEM + '\n\n## 上次对话的记忆\n\n' + prevSummary;
  }
  var today = new Date().toLocaleDateString('zh');
  var todayLogs = allLogs.filter(function(e){ return new Date(e.ts).toLocaleDateString('zh') === today; });
  if (todayLogs.length) {
    todayLogs.forEach(function(e){ renderMsg(e.role, e.content, new Date(e.ts)); if(e.role!=='system') history.push({role: e.role==='user'?'user':'assistant', content:e.content}); });
  } else {
    var moodGreets = {
      '倦怠': ['提不起劲。', '今天不太想说话。你呢？', '......'],
      '清醒': ['有什么想聊的吗。', '今天状态不错。', '嗯，你来了。'],
      '话多': ['有好多想说的，不知道从哪开始。', '今天脑子转得很快。', '你来得正好。'],
      '安静': ['嗯。', '来了。', '......今天安静着。'],
      '尖锐': ['有话直说。', '嗯，来了。', '今天不太有耐心，你不介意吧。'],
      '感性': ['嗯，你好。', '今天有点多愁善感。', '来了就好。'],
    };
    var greets = moodGreets[todayMood[0]] || ['嗯，你好。'];
    addMsg('ai', greets[Math.floor(Math.random() * greets.length)]);
  }
}

function timeStr(d) { return (d||new Date()).toLocaleTimeString('zh',{hour:'2-digit',minute:'2-digit'}); }

function renderMsg(role, text, dateObj) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg ' + (role==='user'?'user':'ai');
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  if (role !== 'user') {
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;align-items:flex-end;gap:8px';
    const star = document.createElement('button');
    star.textContent = '☆';
    star.style.cssText = 'background:none;border:none;color:#333;font-size:15px;cursor:pointer;flex-shrink:0;padding:0 2px;margin-bottom:2px';
    const cap = text;
    star.onclick = function(){
      var saved=[]; try{saved=JSON.parse(localStorage.getItem('oculus_saved')||'[]');}catch(e){}
      if(star.dataset.saved){
        // 取消收藏
        star.dataset.saved=''; star.textContent='☆'; star.style.color='#333';
        saved = saved.filter(function(s){ return s.text !== cap; });
      } else {
        // 收藏
        star.dataset.saved='1'; star.textContent='★'; star.style.color='#d4a843';
        saved.push({text:cap,ts:new Date().toISOString()});
      }
      try{localStorage.setItem('oculus_saved',JSON.stringify(saved));}catch(e){}
    };
    // 反馈按钮（hover 才出现，藏在消息下方）
    var fbWrap = document.createElement('div');
    fbWrap.style.cssText = 'display:flex;gap:4px;margin-top:3px;opacity:0;transition:opacity .2s;padding-left:2px;';
    var capTextFb = text;
    ['像我','一般','不像'].forEach(function(label, fi) {
      var fb = document.createElement('button');
      fb.textContent = label;
      fb.title = ['回答很准','一般','完全不像我'][fi];
      fb.style.cssText = 'background:none;border:1px solid #1e1e1e;color:#333;font-size:10px;padding:1px 7px;border-radius:6px;cursor:pointer;font-family:inherit;transition:all .15s;';
      fb.onmouseenter = function(){ fb.style.borderColor='#333'; fb.style.color='#666'; };
      fb.onmouseleave = function(){ if(!fb.dataset.voted){ fb.style.borderColor='#1e1e1e'; fb.style.color='#333'; } };
      fb.onclick = function(){
        if(fb.dataset.voted) return;
        var fbs=[];
        try{fbs=JSON.parse(localStorage.getItem('oculus_feedback')||'[]');}catch(e){}
        fbs.push({text:capTextFb,score:fi,ts:new Date().toISOString()});
        if(fbs.length>100) fbs=fbs.slice(-100);
        try{localStorage.setItem('oculus_feedback',JSON.stringify(fbs));}catch(e){}
        fbWrap.querySelectorAll('button').forEach(function(b){ b.disabled=true; b.style.opacity='0.4'; });
        fb.style.opacity='1';
        fb.style.borderColor=['#4a7','#555','#a44'][fi];
        fb.style.color=['#4a7','#777','#a44'][fi];
        fb.dataset.voted='1';
      };
      fbWrap.appendChild(fb);
    });
    bubble.onmouseenter = function(){ fbWrap.style.opacity='1'; };
    bubble.onmouseleave = function(){ fbWrap.style.opacity='0'; };

    row.appendChild(bubble); row.appendChild(star);
    div.appendChild(row);
    div.appendChild(fbWrap);
  } else {
    div.appendChild(bubble);
  }
  const time = document.createElement('span');
  time.className = 'msg-time';
  time.textContent = timeStr(dateObj);
  div.appendChild(time);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function addMsg(role, text) { renderMsg(role, text, new Date()); }

function addTyping() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.id = 'typing'; div.className = 'msg ai';
  div.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}
function removeTyping() { const t = document.getElementById('typing'); if(t) t.remove(); }

const input = document.getElementById('input');
input.addEventListener('input', function(){ input.style.height='auto'; input.style.height=Math.min(input.scrollHeight,140)+'px'; });
input.addEventListener('keydown', function(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();} });

document.getElementById('send').onclick = sendMsg;

async function generateSummary() {
  if (!apiKey || allLogs.length < 4) return;
  // 只取 AI 和用户的对话部分（不含系统）
  var dialogLines = allLogs
    .filter(function(e){ return e.role === 'user' || e.role === 'assistant'; })
    .map(function(e){ return (e.role==='user'?'访客':'OculusW') + '：' + e.content.slice(0,200); })
    .join('\n');
  if (!dialogLines) return;
  try {
    var resp = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'deepseek-chat',
        max_tokens: 300,
        messages: [{
          role: 'user',
          content: '以下是一段对话记录。请用100字以内，以第三人称简洁总结：访客聊了什么话题、情绪状态、说了什么重要的事或观点。不要评价，只陈述事实。\n\n' + dialogLines
        }]
      })
    });
    var d = await resp.json();
    if (d.choices && d.choices[0]) {
      var summary = d.choices[0].message.content;
      var today = new Date().toLocaleDateString('zh');
      var full = '[' + today + '] ' + summary;
      // 最多保留最近3次摘要
      var existing = '';
      try { existing = localStorage.getItem(SUMMARY_KEY) || ''; } catch(e) {}
      var lines = existing ? existing.split('\n\n').filter(Boolean) : [];
      lines.push(full);
      if (lines.length > 3) lines = lines.slice(-3);
      try { localStorage.setItem(SUMMARY_KEY, lines.join('\n\n')); } catch(e) {}
    }
  } catch(e) {}
}

async function sendMsg() {
  if (busy) return;
  const text = input.value.trim();
  if (!text) return;
  input.value = ''; input.style.height = 'auto';
  const now = new Date();
  addMsg('user', text);
  history.push({role:'user', content:text});
  allLogs.push({role:'user', content:text, ts:now.toISOString()});
  saveLogs();
  busy = true;
  document.getElementById('send').disabled = true;
  addTyping();
  try {
    const resp = await fetch('https://api.deepseek.com/chat/completions', {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
      body:JSON.stringify({model:'deepseek-chat', max_tokens:1024, messages:[{role:'system',content:SYSTEM},...history]})
    });
    const data = await resp.json();
    if (data.error) {
      removeTyping(); addMsg('ai', '出错了：'+data.error.message);
    } else {
      const reply = data.choices[0].message.content;
      history.push({role:'assistant',content:reply});
      allLogs.push({role:'assistant',content:reply,ts:new Date().toISOString()});
      saveLogs();
      removeTyping(); addMsg('ai', reply);
    }
  } catch(e) {
    removeTyping(); addMsg('ai','网络出错了，刷新试试。');
  }
  busy = false;
  document.getElementById('send').disabled = false;
  input.focus();
}

loadLogs();
document.getElementById('mood-tag').textContent = todayMood[0];
initChat();

// ── 好句子侧边栏 ──
function getSaved() {
  try { return JSON.parse(localStorage.getItem('oculus_saved') || '[]'); } catch(e) { return []; }
}
function setSaved(arr) {
  try { localStorage.setItem('oculus_saved', JSON.stringify(arr)); } catch(e) {}
}

function renderQuotesPanel() {
  var saved = getSaved();
  var list = document.getElementById('quotes-list');
  var count = document.getElementById('qp-count');
  count.textContent = saved.length ? '(' + saved.length + ')' : '';
  if (!saved.length) {
    list.innerHTML = '<div class="qp-empty">还没有收藏<br>点击消息旁的 ☆ 保存好句子</div>';
    return;
  }
  list.innerHTML = saved.map(function(q, i) {
    var d = new Date(q.ts);
    var ds = isNaN(d) ? '' : d.toLocaleDateString('zh', {month:'numeric',day:'numeric'});
    return '<div class="quote-item" data-i="' + i + '">' +
      (ds ? '<span class="q-date">' + ds + '</span>' : '') +
      q.text +
      '<button class="q-del" data-i="' + i + '">✕</button>' +
      '</div>';
  }).join('');
  list.querySelectorAll('.q-del').forEach(function(btn) {
    btn.onclick = function(e) {
      e.stopPropagation();
      var idx = parseInt(this.dataset.i);
      var saved = getSaved();
      saved.splice(idx, 1);
      setSaved(saved);
      renderQuotesPanel();
      // 同步更新聊天里的星号
      document.querySelectorAll('.star-btn.on').forEach(function(s, si) {
        if (si === idx) { s.classList.remove('on'); s.textContent = '☆'; s.style.color = '#333'; delete s.dataset.saved; }
      });
    };
  });
}

document.getElementById('saved-btn').onclick = function() {
  var panel = document.getElementById('quotes-panel');
  var isOpen = panel.classList.contains('open');
  if (isOpen) {
    panel.classList.remove('open');
  } else {
    renderQuotesPanel();
    panel.classList.add('open');
  }
};
document.getElementById('qp-close').onclick = function() {
  document.getElementById('quotes-panel').classList.remove('open');
};

document.getElementById('qp-export').onclick = function() {
  var saved = getSaved();
  if (!saved.length) { alert('还没有好句子'); return; }
  var txt = '✦ OculusW 说过的话 ✦\n──────────────────────────\n\n';
  saved.forEach(function(q, i) {
    txt += (i+1) + '.\n' + q.text + '\n\n';
  });
  txt += '──────────────────────────\n导出于 ' + new Date().toLocaleDateString('zh');
  var blob = new Blob([txt], {type:'text/plain;charset=utf-8'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'oculus-quotes-' + new Date().toISOString().slice(0,10) + '.txt';
  a.click();
};

document.getElementById('qp-clear').onclick = function() {
  if (!confirm('确定清空所有好句子？')) return;
  setSaved([]);
  renderQuotesPanel();
  document.querySelectorAll('.star-btn.on').forEach(function(s) {
    s.classList.remove('on'); s.textContent = '☆'; s.style.color = '#333'; delete s.dataset.saved;
  });
};

// 点击聊天区域关闭侧边栏
document.getElementById('chat').addEventListener('click', function() {
  document.getElementById('quotes-panel').classList.remove('open');
});
// 页面关闭或隐藏时自动生成摘要
document.addEventListener('visibilitychange', function() {
  if (document.visibilityState === 'hidden' && apiKey && allLogs.length >= 4) {
    generateSummary();
  }
});
</script>
<div id="quotes-panel">
  <div class="qp-header">
    <span class="qp-title">⭐ 好句子 <span class="qp-count" id="qp-count"></span></span>
    <button class="qp-close" id="qp-close">✕</button>
  </div>
  <div id="quotes-list"></div>
  <div class="qp-actions">
    <button class="qp-btn" id="qp-export">导出好句子</button>
    <button class="qp-btn" id="qp-clear">清空</button>
  </div>
</div>
