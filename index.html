<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OculusW</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#0e0e0e;color:#e0e0e0;height:100vh;display:flex;flex-direction:column;align-items:center}
header{width:100%;max-width:680px;padding:24px 20px 14px;border-bottom:1px solid #1e1e1e;display:flex;justify-content:space-between;align-items:center}
.profile{display:flex;align-items:center;gap:14px}
.avatar{width:44px;height:44px;border-radius:50%;background:#2a2a2a;display:flex;align-items:center;justify-content:center;font-size:18px}
.profile-info h1{font-size:16px;font-weight:600;color:#f0f0f0}
.profile-info p{font-size:12px;color:#666;margin-top:2px}
.mood-tag{font-size:11px;color:#888;background:#1e1e1e;padding:2px 8px;border-radius:10px;border:1px solid #2a2a2a;margin-left:6px}
.hbtn{background:#1e1e1e;border:1px solid #2a2a2a;color:#888;font-size:12px;padding:6px 12px;border-radius:8px;cursor:pointer;font-family:inherit}
.hbtn:hover{border-color:#444;color:#bbb}
#chat{flex:1;width:100%;max-width:680px;overflow-y:auto;padding:24px 20px;display:flex;flex-direction:column;gap:20px;scroll-behavior:smooth}
.msg{display:flex;flex-direction:column;max-width:78%;gap:4px}
.msg.user{align-self:flex-end;align-items:flex-end}
.msg.ai{align-self:flex-start;align-items:flex-start}
.bubble{padding:11px 15px;border-radius:18px;font-size:14.5px;line-height:1.65;word-break:break-word;white-space:pre-wrap}
.msg.user .bubble{background:#2a2a2a;color:#e8e8e8;border-bottom-right-radius:5px}
.msg.ai .bubble{background:#161616;color:#d8d8d8;border:1px solid #222;border-bottom-left-radius:5px}
.msg-time{font-size:11px;color:#444;padding:0 4px}
.typing{display:flex;gap:5px;padding:14px 16px;background:#161616;border:1px solid #222;border-radius:18px;border-bottom-left-radius:5px;width:fit-content}
.typing span{width:6px;height:6px;background:#555;border-radius:50%;animation:blink 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.3;transform:scale(.85)}40%{opacity:1;transform:scale(1)}}
footer{width:100%;max-width:680px;padding:14px 20px 24px;border-top:1px solid #1a1a1a}
.input-row{display:flex;gap:10px;align-items:flex-end}
#userinput{flex:1;background:#161616;border:1px solid #2a2a2a;border-radius:14px;padding:11px 15px;color:#e0e0e0;font-size:14px;font-family:inherit;resize:none;outline:none;max-height:140px;min-height:44px;line-height:1.5}
#userinput:focus{border-color:#3a3a3a}
#userinput::placeholder{color:#444}
#sendbtn{width:44px;height:44px;border-radius:12px;background:#e8e8e8;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
#sendbtn:hover{background:#fff}
#sendbtn:disabled{background:#2a2a2a;cursor:default}
#overlay{position:fixed;inset:0;background:#0e0e0e;display:flex;align-items:center;justify-content:center;z-index:100}
.keybox{width:340px;padding:32px;background:#141414;border:1px solid #222;border-radius:20px;display:flex;flex-direction:column;gap:16px}
.logo{font-size:28px;font-weight:700;color:#f0f0f0;letter-spacing:-1px}
.logo span{color:#4a90d9}
.keybox h2{font-size:17px;color:#f0f0f0}
.keybox p{font-size:13px;color:#666;line-height:1.6}
.keybox input{background:#0e0e0e;border:1px solid #2a2a2a;border-radius:10px;padding:11px 13px;color:#e0e0e0;font-size:13px;font-family:monospace;outline:none;width:100%}
.keybox input:focus{border-color:#444}
#startbtn{background:#e8e8e8;color:#111;border:none;border-radius:10px;padding:11px;font-size:14px;font-weight:500;cursor:pointer;width:100%}
#startbtn:hover{background:#fff}
.kerr{font-size:12px;color:#e05555;display:none}
#init-err{background:#2a0000;border:1px solid #500;color:#f88;padding:10px 14px;border-radius:8px;font-size:12px;display:none;margin-top:8px}
</style>
</head>
<body>

<div id="overlay">
  <div class="keybox">
    <div class="logo">Deep<span>Seek</span></div>
    <h2>输入 DeepSeek API Key</h2>
    <p>Key 只在你的浏览器本地使用。<br>获取：<a href="https://platform.deepseek.com/api_keys" target="_blank" style="color:#888">platform.deepseek.com</a></p>
    <input id="keyinput" type="password" placeholder="sk-..."/>
    <p id="kerr" class="kerr"></p>
    <button id="startbtn">开始对话</button>
    <div id="init-err"></div>
  </div>
</div>

<header>
  <div class="profile">
    <div class="avatar">◎</div>
    <div class="profile-info">
      <h1>OculusW<span class="mood-tag" id="mood-tag"></span></h1>
      <p>无非叙事而已</p>
    </div>
  </div>
  <button class="hbtn" id="exportbtn">导出对话</button>
</header>

<div id="chat"></div>

<footer>
  <div class="input-row">
    <textarea id="userinput" placeholder="说点什么…" rows="1"></textarea>
    <button id="sendbtn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M22 2L11 13" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
        <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="#111" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
</footer>

    for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return new TextDecoder('utf-8').decode(bytes);
  }
  APP.systemTemplate = b64u(_SYS_B64);
  APP.moods = JSON.parse(b64u(_MOODS_B64));
  APP.ready = true;
} catch(e) {
  APP.ready = false;
  APP.initError = e.toString();
}

var apiKey = '', history = [], busy = false, allLogs = [];

function getTodayMood() {
  var today = new Date().toDateString();
  try {
    var s = localStorage.getItem('oculus_mood');
    if (s) { var p = JSON.parse(s); if (p.date === today) return p.mood; }
  } catch(e) {}
  var mood = APP.moods[Math.floor(Math.random() * APP.moods.length)];
  try { localStorage.setItem('oculus_mood', JSON.stringify({date:today, mood:mood})); } catch(e) {}
  return mood;
}

if (APP.ready) {
  var mood = getTodayMood();
  document.getElementById('mood-tag').textContent = mood[0];
  APP.system = APP.systemTemplate.replace('__MOOD__', mood[0] + '——' + mood[1]);
  try { var s = localStorage.getItem('oculus_log'); if(s) allLogs = JSON.parse(s); } catch(e) {}
}

document.getElementById('startbtn').onclick = function() {
  if (!APP.ready) {
    var el = document.getElementById('init-err');
    el.textContent = '初始化失败：' + APP.initError;
    el.style.display = 'block';
    return;
  }
  var v = document.getElementById('keyinput').value.trim();
  if (!v.startsWith('sk-')) {
    var e = document.getElementById('kerr');
    e.textContent = 'Key 应以 sk- 开头';
    e.style.display = 'block';
    return;
  }
  apiKey = v;
  document.getElementById('overlay').style.display = 'none';
  var today = new Date().toLocaleDateString('zh');
  var todayLogs = allLogs.filter(function(e){ return new Date(e.ts).toLocaleDateString('zh') === today; });
  if (todayLogs.length) {
    todayLogs.forEach(function(e){ renderMsg(e.role, e.content, new Date(e.ts)); if(e.role !== 'system') history.push({role: e.role==='user'?'user':'assistant', content:e.content}); });
  } else {
    addMsg('ai', '嗯，你好。');
  }
};

document.getElementById('exportbtn').onclick = function() {
  if (!allLogs.length) { alert('还没有对话记录'); return; }
  var txt = '# OculusW 对话记录
# ' + new Date().toLocaleString('zh') + '

';
  var lastDate = '';
  allLogs.forEach(function(e) {
    var d = new Date(e.ts), ds = d.toLocaleDateString('zh');
    if (ds !== lastDate) { txt += '
── ' + ds + ' ──

'; lastDate = ds; }
    txt += '[' + d.toLocaleTimeString('zh',{hour:'2-digit',minute:'2-digit'}) + '] ' + (e.role==='user'?'访客':'OculusW') + '：' + e.content + '

';
  });
  var blob = new Blob([txt],{type:'text/plain;charset=utf-8'});
  var a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'oculus-' + new Date().toISOString().slice(0,10) + '.txt'; a.click();
};

function saveLog() { try { localStorage.setItem('oculus_log', JSON.stringify(allLogs)); } catch(e) {} }

function timeStr(d) { return (d||new Date()).toLocaleTimeString('zh',{hour:'2-digit',minute:'2-digit'}); }

function renderMsg(role, text, dateObj) {
  var chat = document.getElementById('chat');
  var div = document.createElement('div');
  div.className = 'msg ' + (role==='user'?'user':'ai');
  var bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  div.appendChild(bubble);
  var t = document.createElement('span');
  t.className = 'msg-time';
  t.textContent = timeStr(dateObj);
  div.appendChild(t);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function addMsg(role, text) { renderMsg(role, text, new Date()); }

function addTyping() {
  var chat = document.getElementById('chat');
  var div = document.createElement('div');
  div.id = 'typing'; div.className = 'msg ai';
  div.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  chat.appendChild(div); chat.scrollTop = chat.scrollHeight;
}
function removeTyping() { var t = document.getElementById('typing'); if(t) t.remove(); }

var inp = document.getElementById('userinput');
inp.addEventListener('input', function() { inp.style.height='auto'; inp.style.height=Math.min(inp.scrollHeight,140)+'px'; });
inp.addEventListener('keydown', function(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();} });
document.getElementById('sendbtn').onclick = sendMsg;

async function sendMsg() {
  if (busy || !apiKey) return;
  var text = inp.value.trim(); if (!text) return;
  inp.value = ''; inp.style.height = 'auto';
  var now = new Date();
  addMsg('user', text);
  history.push({role:'user', content:text});
  allLogs.push({role:'user', content:text, ts:now.toISOString()}); saveLog();
  busy = true; document.getElementById('sendbtn').disabled = true; addTyping();
  try {
    var resp = await fetch('https://api.deepseek.com/chat/completions', {
      method: 'POST',
      headers: {'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
      body: JSON.stringify({model:'deepseek-chat', max_tokens:1024, messages:[{role:'system',content:APP.system},...history]})
    });
    var d = await resp.json();
    if (d.error) { removeTyping(); addMsg('ai','出错了：'+d.error.message); }
    else {
      var reply = d.choices[0].message.content;
      history.push({role:'assistant',content:reply});
      allLogs.push({role:'assistant',content:reply,ts:new Date().toISOString()}); saveLog();
      removeTyping(); addMsg('ai',reply);
    }
  } catch(e) { removeTyping(); addMsg('ai','网络出错了，刷新试试。'); }
  busy = false; document.getElementById('sendbtn').disabled = false; inp.focus();
}
</script>
</body>
